services:
  vulnerable-app:
    build:
      context: ./vulnerable-app
    environment:
      LAB_MODE: ${LAB_MODE:-insecure}
      LAB_LOG_FILE: /app/logs/application.jsonl
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 8080
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./logs:/app/logs

# detection-engine is intentionally not implemented yet.
# It will be added in a later milestone after the app emits stable logs.
